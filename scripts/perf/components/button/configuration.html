<p9r-attr-sync>
    <p9r-section data-title="Style">
        <p9r-select name="variant" label="Variant">
            <option selected value="filled">Filled</option>
            <option value="ghost">Ghost</option>
        </p9r-select>
        <p9r-select name="size" label="Size">
            <option value="sm">Small</option>
            <option selected value="md">Medium</option>
            <option value="lg">Large</option>
        </p9r-select>
    </p9r-section>
    <p9r-section data-title="Link">
        <p9r-page-link name="href" label="Target page"></p9r-page-link>
    </p9r-section>
</p9r-attr-sync>

<p9r-section data-title="Label">
    <p9r-comp-sync>
        <span>Click me</span>
    </p9r-comp-sync>
</p9r-section>
