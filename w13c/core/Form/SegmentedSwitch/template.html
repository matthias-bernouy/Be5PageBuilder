<div class="switch-container">
    <label for="group-label">
        <slot name="label">Choose an option</slot>
    </label>

    <div class="switch-wrapper" role="radiogroup" aria-labelledby="group-label">
        <div class="selection-slider"></div>
        
        <div class="options-container">
            <slot></slot> 
        </div>
    </div>

    <span class="error-message" id="error-text">
        <slot name="error"></slot>
    </span>
</div>
