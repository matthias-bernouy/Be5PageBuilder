<div id="hero-panel">
    <p9r-section>
        <label>Titre</label>
        <p9r-panel-item
            data-slot-target="title"
            data-element="input"
            data-key="title"
            data-name="Titre">
        </p9r-panel-item>

        <label>Contenu</label>
        <p9r-panel-item
            data-slot-target="content"
            data-element="textarea"
            data-key="content"
            data-name="Contenu">
        </p9r-panel-item>

        <label>Footer</label>
        <p9r-panel-item
            data-slot-target="footer"
            data-element="input"
            data-key="footer"
            data-name="Footer">
        </p9r-panel-item>

        <label>Image</label>
        <p9r-panel-item
            data-slot-target="image"
            data-element="img"
            data-key="image"
            data-name="Image">
        </p9r-panel-item>
    </p9r-section>
</div>
