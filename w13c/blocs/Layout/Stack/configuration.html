<p9r-attr-sync>
    <p9r-section data-title="Dimensions">
        <p9r-select name="max-width" label="Largeur du contenu">
            <option value="680">Article (680px)</option>
            <option value="1000">Étroit (1000px)</option>
            <option selected value="1280">Standard (1280px)</option>
            <option value="1512">Large (1512px)</option>
            <option value="fit-content">Fit content</option>
            <option value="max-content">Max content</option>
        </p9r-select>
        <p9r-select name="align" label="Alignement">
            <option value="flex-start">Gauche</option>
            <option selected value="center">Centre</option>
            <option value="flex-end">Droite</option>
        </p9r-select>
    </p9r-section>
    <p9r-section data-title="Espacement">
        <p9r-sizes-select name="padding-y" label="Padding vertical"></p9r-sizes-select>
        <p9r-sizes-select name="gap" label="Espacement entre éléments"></p9r-sizes-select>
    </p9r-section>
    <p9r-section data-title="Fond">
        <p9r-select name="bg" label="Arrière-plan (pleine largeur)">
            <option selected value="none">Aucun</option>
            <option value="base">Base</option>
            <option value="surface">Surface</option>
            <option value="overlay">Overlay</option>
            <option value="primary">Primaire</option>
            <option value="secondary">Secondaire</option>
        </p9r-select>
        <p9r-select name="inner-bg" label="Arrière-plan (contenu)">
            <option selected value="none">Aucun</option>
            <option value="base">Base</option>
            <option value="surface">Surface</option>
            <option value="overlay">Overlay</option>
        </p9r-select>
        <p9r-sizes-select name="inner-padding" label="Padding intérieur"></p9r-sizes-select>
        <p9r-range name="inner-radius" label="Arrondi intérieur" min="0" max="32" step="1" value="0" unit="px"></p9r-range>
        <p9r-select name="text-color" label="Couleur du texte">
            <option selected value="auto">Auto</option>
            <option value="dark">Sombre</option>
            <option value="light">Clair</option>
        </p9r-select>
    </p9r-section>
</p9r-attr-sync>

<p9r-comp-sync allow-multiple>
    <p>Contenu de la stack...</p>
</p9r-comp-sync>
