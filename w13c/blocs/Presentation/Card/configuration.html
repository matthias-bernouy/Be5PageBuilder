<p9r-attr-sync>
    <p9r-section data-title="Disposition">
        <p9r-select name="direction" label="Direction">
            <option selected value="vertical">Verticale</option>
            <option value="horizontal">Horizontale</option>
        </p9r-select>
        <p9r-select name="media" label="Image">
            <option selected value="visible">Afficher</option>
            <option value="none">Masquer</option>
        </p9r-select>
        <p9r-select name="ratio" label="Ratio image">
            <option selected value="16-9">16:9</option>
            <option value="4-3">4:3</option>
            <option value="1">1:1</option>
            <option value="21-9">21:9</option>
        </p9r-select>
    </p9r-section>
    <p9r-section data-title="Style">
        <p9r-select name="variant" label="Variante">
            <option selected value="elevated">Élevée</option>
            <option value="outline">Bordure</option>
            <option value="ghost">Transparente</option>
        </p9r-select>
        <p9r-range name="radius" label="Arrondi" min="0" max="32" step="1" value="16" unit="px"></p9r-range>
        <p9r-range name="padding" label="Espacement" min="8" max="40" step="2" value="20" unit="px"></p9r-range>
    </p9r-section>
</p9r-attr-sync>

<p9r-section data-title="Image">
    <p9r-image-sync slotTarget="image" label="Image de couverture" default="https://placehold.co/800x450"></p9r-image-sync>
</p9r-section>

<p9r-comp-sync optionnal>
    <span slot="tag">Nouveau</span>
</p9r-comp-sync>

<p9r-comp-sync optionnal>
    <span slot="subtitle">Catégorie</span>
</p9r-comp-sync>

<p9r-comp-sync>
    <span slot="title">Titre de la carte</span>
</p9r-comp-sync>

<p9r-comp-sync optionnal>
    <p slot="description">Une description concise pour donner envie d'en savoir plus.</p>
</p9r-comp-sync>

<p9r-comp-sync allow-others-components optionnal>
    <p slot="footer">En savoir plus</p>
</p9r-comp-sync>
