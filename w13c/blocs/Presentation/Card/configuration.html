<p9r-attr-sync>
    <p9r-section data-title="Layout">
        <p9r-select name="direction" label="Direction">
            <option selected value="vertical">Vertical</option>
            <option value="horizontal">Horizontal</option>
        </p9r-select>
        <p9r-select name="align" label="Text alignment">
            <option selected value="left">Left</option>
            <option value="center">Center</option>
            <option value="right">Right</option>
        </p9r-select>
    </p9r-section>
    <p9r-section data-title="Media">
        <p9r-select name="media" label="Image">
            <option selected value="visible">Show</option>
            <option value="none">Hide</option>
        </p9r-select>
        <p9r-select name="ratio" label="Image ratio">
            <option selected value="16-9">16:9</option>
            <option value="4-3">4:3</option>
            <option value="1">1:1</option>
            <option value="21-9">21:9</option>
            <option value="3-4">3:4 (portrait)</option>
        </p9r-select>
        <p9r-select name="img-fit" label="Image fit">
            <option selected value="cover">Cover</option>
            <option value="contain">Contain</option>
        </p9r-select>
    </p9r-section>
    <p9r-section data-title="Style">
        <p9r-select name="variant" label="Variant">
            <option selected value="elevated">Elevated</option>
            <option value="outline">Outline</option>
            <option value="ghost">Ghost</option>
            <option value="filled">Filled</option>
        </p9r-select>
        <p9r-select name="bg" label="Background">
            <option selected value="surface">Surface</option>
            <option value="base">Base</option>
            <option value="overlay">Overlay</option>
            <option value="primary">Primary</option>
            <option value="secondary">Secondary</option>
        </p9r-select>
        <p9r-range name="radius" label="Border radius" min="0" max="32" step="1" value="16" unit="px"></p9r-range>
        <p9r-sizes-select name="padding" label="Padding"></p9r-sizes-select>
    </p9r-section>
    <p9r-section data-title="Interaction">
        <p9r-select name="hover" label="Hover effect">
            <option selected value="shadow">Shadow lift</option>
            <option value="scale">Scale up</option>
            <option value="border">Border highlight</option>
            <option value="none">None</option>
        </p9r-select>
        <p9r-page-link name="href" label="Link"></p9r-page-link>
        <p9r-select name="target" label="Open in">
            <option selected value="_self">Same tab</option>
            <option value="_blank">New tab</option>
        </p9r-select>
    </p9r-section>
</p9r-attr-sync>

<p9r-section data-title="Media">
    <p9r-image-sync slotTarget="image" label="Cover image" default="https://placehold.co/800x450"></p9r-image-sync>
</p9r-section>

<p9r-comp-sync optionnal>
    <span slot="tag">New</span>
</p9r-comp-sync>

<p9r-comp-sync optionnal>
    <span slot="subtitle">Category</span>
</p9r-comp-sync>

<p9r-comp-sync>
    <span slot="title">Card title</span>
</p9r-comp-sync>

<p9r-comp-sync optionnal>
    <p slot="description">A concise description to spark curiosity.</p>
</p9r-comp-sync>

<p9r-comp-sync allow-others-components optionnal>
    <p slot="footer">Learn more</p>
</p9r-comp-sync>
