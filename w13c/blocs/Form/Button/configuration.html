<p9r-attr-sync>
    <p9r-section data-title="Style">
        <select name="variant">
            <option selected value="filled">Filled</option>
            <option value="outline">Outline</option>
            <option value="ghost">Ghost</option>
        </select>
        <select name="color">
            <option selected value="primary">Primary</option>
            <option value="secondary">Secondary</option>
            <option value="success">Success</option>
            <option value="danger">Danger</option>
            <option value="warning">Warning</option>
            <option value="info">Info</option>
        </select>
    </p9r-section>
    <p9r-section data-title="Sizes">
        <select name="size">
            <option value="sm">Small</option>
            <option selected value="md">Medium</option>
            <option value="lg">Large</option>
        </select>
    </p9r-section>
    <p9r-section data-title="Link">
        <p9r-page-link name="href" label="Link" />
    </p9r-section>
</p9r-attr-sync>

<p9r-section data-title="Icons">
    <p9r-image-sync slotTarget="icon-left" label="Left Icon"></p9r-image-sync>
    <p9r-image-sync slotTarget="icon-right" label="Right Icon"></p9r-image-sync>
</p9r-section>

<p9r-comp-sync>
    <span>Bouton</span>
</p9r-comp-sync>
