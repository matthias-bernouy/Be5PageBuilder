<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
    <defs>
        <linearGradient id="t-cover" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#4361ee"/>
            <stop offset="1" stop-color="#7048e8"/>
        </linearGradient>
        <clipPath id="t-card">
            <rect width="240" height="152" rx="12"/>
        </clipPath>
        <filter id="t-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.1"/>
        </filter>
    </defs>

    <rect width="320" height="200" fill="#f1f5f9"/>

    <g transform="translate(40, 24)" filter="url(#t-shadow)">
        <g clip-path="url(#t-card)">
            <rect width="240" height="152" fill="#ffffff"/>
            <rect width="240" height="60" fill="url(#t-cover)"/>
            <circle cx="200" cy="18" r="22" fill="#ffffff" fill-opacity="0.15"/>
            <circle cx="224" cy="44" r="30" fill="#ffffff" fill-opacity="0.1"/>
            <circle cx="32" cy="50" r="16" fill="#ffffff" fill-opacity="0.08"/>
        </g>
        <rect width="240" height="152" rx="12" fill="none" stroke="#e2e8f0"/>

        <rect x="16" y="76" width="32" height="32" rx="8" fill="#eef2ff"/>
        <path d="M 24 92 l 6 6 l 10 -12" stroke="#4361ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        <rect x="56" y="78" width="140" height="10" rx="3" fill="#1e293b"/>
        <rect x="56" y="96" width="168" height="5" rx="2" fill="#cbd5e1"/>
        <rect x="56" y="106" width="120" height="5" rx="2" fill="#cbd5e1"/>

        <rect x="16" y="120" width="64" height="20" rx="6" fill="#4361ee"/>
        <rect x="28" y="127" width="40" height="6" rx="2" fill="#ffffff" fill-opacity="0.9"/>
    </g>
</svg>
