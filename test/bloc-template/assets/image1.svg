<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f8fafc"/>
            <stop offset="1" stop-color="#e2e8f0"/>
        </linearGradient>
        <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#4361ee"/>
            <stop offset="1" stop-color="#7048e8"/>
        </linearGradient>
        <clipPath id="card">
            <rect width="480" height="340" rx="20"/>
        </clipPath>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1e293b" flood-opacity="0.14"/>
        </filter>
    </defs>

    <rect width="800" height="450" fill="url(#bg)"/>

    <g transform="translate(160, 55)" filter="url(#shadow)">
        <g clip-path="url(#card)">
            <rect width="480" height="340" fill="#ffffff"/>

            <rect width="480" height="140" fill="url(#cover)"/>
            <circle cx="390" cy="30" r="54" fill="#ffffff" fill-opacity="0.15"/>
            <circle cx="448" cy="96" r="70" fill="#ffffff" fill-opacity="0.1"/>
            <circle cx="60" cy="120" r="42" fill="#ffffff" fill-opacity="0.08"/>
            <circle cx="160" cy="40" r="20" fill="#ffffff" fill-opacity="0.12"/>
        </g>
        <rect width="480" height="340" rx="20" fill="none" stroke="#e2e8f0"/>

        <rect x="32" y="168" width="60" height="60" rx="14" fill="#eef2ff"/>
        <path d="M 48 200 l 10 10 l 20 -22" stroke="#4361ee" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        <rect x="108" y="176" width="280" height="16" rx="4" fill="#1e293b"/>
        <rect x="108" y="204" width="180" height="10" rx="3" fill="#94a3b8"/>

        <rect x="32" y="248" width="416" height="8" rx="3" fill="#cbd5e1"/>
        <rect x="32" y="266" width="390" height="8" rx="3" fill="#cbd5e1"/>
        <rect x="32" y="284" width="260" height="8" rx="3" fill="#cbd5e1"/>

        <rect x="32" y="300" width="120" height="28" rx="8" fill="#4361ee"/>
        <rect x="56" y="312" width="72" height="6" rx="2" fill="#ffffff" fill-opacity="0.9"/>

        <rect x="164" y="300" width="110" height="28" rx="8" fill="none" stroke="#4361ee" stroke-width="2"/>
        <rect x="188" y="312" width="62" height="6" rx="2" fill="#4361ee"/>
    </g>
</svg>
