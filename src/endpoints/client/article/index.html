<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
:root {
    --text-color: #111;
    --muted-color: #666;
    --line-color: #eee;
}

.split-grid {
    max-width: 900px; /* On contraint la largeur pour le confort de lecture */
    margin: 0 auto;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    gap: 0; /* On utilise les bordures pour séparer */
}

.split-card {
    display: grid;
    grid-template-columns: 1fr 180px; /* L'image est fixée à 180px, le texte prend le reste */
    gap: 40px;
    padding: 32px 0;
    border-bottom: 1px solid var(--line-color);
    align-items: center;
    transition: opacity 0.3s;
}

.split-card:hover {
    cursor: pointer;
}

.split-card:hover img {
    filter: saturate(1.2);
    transform: scale(1.02);
}

/* Texte */
.meta {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted-color);
    margin-bottom: 12px;
    font-weight: 600;
}

.meta .dot { margin: 0 8px; color: #ccc; }

.split-content h2 {
    font-size: 1.6rem;
    font-weight: 800;
    margin: 0 0 10px 0;
    line-height: 1.2;
    letter-spacing: -0.5px;
}

.split-content p {
    font-size: 15px;
    color: var(--muted-color);
    line-height: 1.5;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Image compacte */
.split-image {
    width: 180px;
    height: 120px; /* Format rectangulaire fin */
    border-radius: 2px; /* Presque droit */
    overflow: hidden;
    background: #f5f5f5;
}

.split-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: all 0.5s ease;
}

/* Responsive : on empile sur mobile */
@media (max-width: 600px) {
    .split-card {
        grid-template-columns: 1fr;
        gap: 20px;
    }
    .split-image {
        width: 100%;
        height: 200px;
        order: -1; /* Image au-dessus sur mobile */
    }
}
    </style>
</head>
<body>

<div class="split-grid">
  <article class="split-card">
    <div class="split-content">
      <div class="meta">
        <span class="date">20 DÉC. 2025</span>
        <span class="dot">•</span>
        <span class="author">B. VITTECOQ</span>
      </div>
      <h2>Joyeuses fêtes</h2>
      <p>L'association vous souhaite une fin d'année étincelante et chaleureuse.</p>
    </div>
    <div class="split-image">
      <img src="https://picsum.photos/600" alt="">
    </div>
  </article>
</div>

</body>
</html>
