<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be5 Page Builder</title>
    <link rel="stylesheet" href="../css/style.css">

    <script src="./script.js"></script>

</head>

<body>

    <w13c-fixed-admin-layout>
        <span slot="title">Pages</span>

        <p9r-button slot="action" data-modal="create-page-dialog" color="primary">+ New page</p9r-button>
        <p9r-button slot="action" data-modal="import-block-dialog" variant="outlined" color="info">Import Block</p9r-button>

        <p9r-table>
            <p9r-row slot="header">
                <p9r-cell><strong>Page title</strong></p9r-cell>
                <p9r-cell><strong>Path</strong></p9r-cell>
                <p9r-cell><strong>Tags</strong></p9r-cell>
                <p9r-cell><strong>Visibility</strong></p9r-cell>
            </p9r-row>
        </p9r-table>
    </w13c-fixed-admin-layout>

    <p9r-form-dialog id="create-page-dialog" action="./editor">
        <span slot="title">Create a new page</span>
        <w13c-input name="title">
            <span slot="label">Name (e. g. My Beautiful Article)</span>
        </w13c-input>
        <w13c-input name="identifier">
            <span slot="label">Identifier (e. g. my-beautiful-article)</span>
        </w13c-input>
        <w13c-input name="path">
            <span slot="label">Path (e. g. /article)</span>
        </w13c-input>
    </p9r-form-dialog>

    <p9r-form-dialog id="import-block-dialog" action="../api/bloc" method="post" enctype="multipart/form-data">
        <span slot="title">Import a block</span>
        <w13c-input name="name">
            <span slot="label">Name (e. g. ArticleLayout)</span>
        </w13c-input>
        <w13c-input name="group">
            <span slot="label">Group (e. g. Layout)</span>
        </w13c-input>
        <w13c-input-file name="viewJS">
            <span slot="label">View Code JS</span>
        </w13c-input-file>
        <w13c-input-file name="editorJS">
            <span slot="label">Editor Code JS</span>
        </w13c-input-file>
    </p9r-form-dialog>

</body>

</html>
