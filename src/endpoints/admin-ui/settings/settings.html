<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Be5 Page Builder</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="./script.js"></script>
    <script src="./settings.js" defer></script>
    <style>
        #settings-form {
            display: grid;
            gap: 12px;
            max-width: 760px;
        }
        .fields {
            display: grid;
            gap: 14px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted, #94a3b8);
        }
        .favicon-picker {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.875rem;
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-default);
            border-radius: 10px;
            background: var(--bg-surface);
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            text-align: left;
            font: inherit;
            color: inherit;
        }
        .favicon-picker:hover {
            border-color: var(--primary-base);
            background: var(--primary-muted);
        }
        .favicon-picker:focus-visible {
            outline: none;
            border-color: var(--primary-base);
            box-shadow: 0 0 0 3px var(--primary-muted);
        }
        .favicon-picker[data-empty="true"] {
            border-style: dashed;
            background: var(--bg-base);
        }
        .favicon-picker .tile {
            flex: 0 0 auto;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .favicon-picker .tile img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
            box-sizing: border-box;
        }
        .favicon-picker[data-empty="true"] .tile img { display: none; }
        .favicon-picker:not([data-empty="true"]) .tile .tile-placeholder { display: none; }
        .favicon-picker .tile-placeholder {
            color: var(--text-muted);
        }
        .favicon-picker .text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex: 1 1 auto;
        }
        .favicon-picker .text .title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
        }
        .favicon-picker .text .subtitle {
            font-size: 11px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .favicon-clear {
            flex: 0 0 auto;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        .favicon-clear:hover {
            background: var(--danger-muted);
            color: var(--danger-base);
        }
        .favicon-picker[data-empty="true"] .favicon-clear { display: none; }
        textarea[name="site.theme"] {
            width: 100%;
            min-height: 280px;
            padding: 12px;
            border: 1px solid var(--border-default, #e2e8f0);
            border-radius: 8px;
            background: var(--bg-base, #f8fafc);
            color: var(--text-main, #1e293b);
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            line-height: 1.55;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-sizing: border-box;
        }
        textarea[name="site.theme"]:focus {
            border-color: var(--primary-base, #4361ee);
            box-shadow: 0 0 0 3px var(--primary-muted, rgb(67 97 238 / 0.15));
        }
    </style>
</head>

<body>

    <w13c-fixed-admin-layout>
        <span slot="title">Settings</span>
        <p9r-button slot="action" id="save-btn" color="primary">Save</p9r-button>

        <form id="settings-form">

            <p9r-section data-title="Site">
                <div class="fields">
                    <w13c-input name="site.name" id="site-name">
                        <span slot="label">Site name</span>
                    </w13c-input>
                    <div class="field">
                        <label class="field-label">Favicon</label>
                        <button type="button" id="favicon-picker" class="favicon-picker" data-empty="true" aria-label="Choose favicon from Media Center">
                            <span class="tile">
                                <img id="favicon-preview" alt="">
                                <svg class="tile-placeholder" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
                            </span>
                            <span class="text">
                                <span class="title" id="favicon-title">Choose a favicon</span>
                                <span class="subtitle" id="favicon-subtitle">Click to pick from the Media Center</span>
                            </span>
                            <span id="favicon-clear" class="favicon-clear" role="button" aria-label="Clear favicon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            </span>
                        </button>
                        <input type="hidden" id="site-favicon" name="site.favicon" value="">
                    </div>
                    <w13c-input name="site.host" id="site-host">
                        <span slot="label">Host (canonical base URL, e.g. https://example.com)</span>
                    </w13c-input>
                    <p9r-select name="site.language" id="site-language" label="Language">
                        <option value="" selected>-- Not set --</option>
                        <option value="en">English (en)</option>
                        <option value="en-US">English — United States (en-US)</option>
                        <option value="en-GB">English — United Kingdom (en-GB)</option>
                        <option value="fr">Français (fr)</option>
                        <option value="fr-FR">Français — France (fr-FR)</option>
                        <option value="fr-BE">Français — Belgique (fr-BE)</option>
                        <option value="fr-CA">Français — Canada (fr-CA)</option>
                        <option value="fr-CH">Français — Suisse (fr-CH)</option>
                        <option value="de">Deutsch (de)</option>
                        <option value="de-DE">Deutsch — Deutschland (de-DE)</option>
                        <option value="de-AT">Deutsch — Österreich (de-AT)</option>
                        <option value="de-CH">Deutsch — Schweiz (de-CH)</option>
                        <option value="es">Español (es)</option>
                        <option value="es-ES">Español — España (es-ES)</option>
                        <option value="es-MX">Español — México (es-MX)</option>
                        <option value="it">Italiano (it)</option>
                        <option value="nl">Nederlands (nl)</option>
                        <option value="nl-BE">Nederlands — België (nl-BE)</option>
                        <option value="pt">Português (pt)</option>
                        <option value="pt-BR">Português — Brasil (pt-BR)</option>
                        <option value="pl">Polski (pl)</option>
                        <option value="ru">Русский (ru)</option>
                        <option value="ja">日本語 (ja)</option>
                        <option value="zh">中文 (zh)</option>
                        <option value="zh-CN">中文 — 简体 (zh-CN)</option>
                        <option value="zh-TW">中文 — 繁體 (zh-TW)</option>
                        <option value="ar">العربية (ar)</option>
                    </p9r-select>
                </div>
            </p9r-section>

            <p9r-section data-title="System pages">
                <div class="fields">
                    <p9r-select name="site.notFound" id="site-notFound" label="Not Found (404)"></p9r-select>
                    <p9r-select name="site.serverError" id="site-serverError" label="Server Error (500)"></p9r-select>
                </div>
            </p9r-section>

            <p9r-section data-title="Theme" data-collapsed>
                <div class="fields">
                    <div class="field">
                        <label class="field-label" for="site-theme">Theme CSS (served at <code>/style</code>)</label>
                        <textarea name="site.theme" id="site-theme" spellcheck="false"></textarea>
                    </div>
                </div>
            </p9r-section>

            <p9r-section data-title="Editor">
                <div class="fields">
                    <p9r-select name="editor.layoutCategory" id="editor-layoutCategory" label="Layout category (shown at page creation)"></p9r-select>
                </div>
            </p9r-section>

        </form>

        <w13c-mediacenter id="favicon-mediacenter"></w13c-mediacenter>

    </w13c-fixed-admin-layout>

</body>

</html>
