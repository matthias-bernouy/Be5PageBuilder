<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snippets</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="./script.js"></script>

</head>
<body>
    <w13c-fixed-admin-layout>
        <span slot="title">Snippets</span>
        <a slot="action" href="./snippets/editor">
            <p9r-button color="primary">+ New snippet</p9r-button>
        </a>

        <p9r-table>
            <p9r-row slot="header">
                <p9r-cell>Identifier</p9r-cell>
                <p9r-cell>Name</p9r-cell>
                <p9r-cell>Category</p9r-cell>
                <p9r-cell>Updated</p9r-cell>
                <p9r-cell></p9r-cell>
            </p9r-row>
        </p9r-table>
    </w13c-fixed-admin-layout>
</body>
</html>
