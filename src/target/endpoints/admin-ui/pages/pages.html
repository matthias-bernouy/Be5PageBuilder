<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be5 Page Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

    <script src="./script.js"></script>

</head>

<body>

    <w13c-fixed-admin-layout>
        <w13c-action-group data-align="right">
            <p9r-button data-modal="modal-new-page">+ New page</p9r-button>
            <p9r-button variant="filled" color="primary">Publier</p9r-button>

            <p9r-button variant="filled" color="danger">Supprimer</p9r-button>

            <p9r-button variant="outlined" color="primary">En savoir plus</p9r-button>

            <p9r-button variant="ghost" color="primary">Annuler</p9r-button>

        </w13c-action-group>


        <div class="table-container">
            <p9r-table>
                <tr slot="header">
                    <th>Article name</th>
                    <th>Path</th>
                    <th>Identifier</th>
                    <th>Visible</th>
                </tr>

                <tr slot="body">
                    <td style="font-weight: 600; color: var(--text-main);">Introduction à Aelf1er</td>
                    <td><code style="color: var(--primary-base);">/docs/intro</code></td>
                    <td><span style="opacity: 0.6;">#art_01</span></td>
                    <td>
                        <span style="color: var(--success-base);">● Oui</span>
                    </td>
                </tr>
                <tr slot="body">
                    <td style="font-weight: 600; color: var(--text-main);">Introduction à Aelf1er</td>
                    <td><code style="color: var(--primary-base);">/docs/intro</code></td>
                    <td><span style="opacity: 0.6;">#art_01</span></td>
                    <td>
                        <span style="color: var(--success-base);">● Oui</span>
                    </td>
                </tr>
            </p9r-table>
        </div>
    </w13c-fixed-admin-layout>

    <dialog id="modal-new-page">
        <div class="modal-content">
            <header>
                <h3>New page</h3>
                <p>Fill the following informations.</p>
            </header>

            <form method="get" action="./article">
                <div class="form-body">
                    <label for="identifier">Identifier (letters, numbers and dashes)</label>
                    <input type="text" id="identifier" name="identifier" class="url-text-input"
                        placeholder="a-beautiful-page">
                </div>

                <footer>

                    <button type="button" class="btn-secondary" onclick="this.closest('dialog').close()">Cancel</button>
                    <button type="submit" class="btn-primary">Confirm</button>
                </footer>
            </form>
        </div>
    </dialog>


</body>

</html>
