<dialog>
  <div class="modal-container">
    <header class="modal-header">
      <div class="header-left">
        <h2>Media Center</h2>

      </div>
              <div class="toolbar">
          <p9r-button id="btnCreateFolder" title="New folder" variant="outlined">
            <svg slot="icon-left" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 10.5v6m3-3H9m4.06-7.19-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z" />
            </svg>
            New folder
          </p9r-button>
          <p9r-button id="idUploadTrigger" title="Import" color="primary">
            <svg slot="icon-left" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Import file
          </p9r-button>
        </div>
      <button class="btn-close" onclick="this.closest('dialog').close()">×</button>
    </header>

    <div class="search-bar">
      <button id="btnGoBack" class="btn-icon" title="Back" disabled>⬅</button>
      <input type="search" id="searchInput" placeholder="Search in this folder...">
    </div>

    <div id="imgContainer" class="media-grid">
    </div>

    <footer class="modal-footer">
      <span id="pathDisplay" class="path-info">Root</span>
      <div class="footer-actions">
        <button class="btn btn-secondary" onclick="this.closest('dialog').close()">Cancel</button>
        <button class="btn btn-primary" id="confirm-selection">Select</button>
      </div>
    </footer>
  </div>
</dialog>
