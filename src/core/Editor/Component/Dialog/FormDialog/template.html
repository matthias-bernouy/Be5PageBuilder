<dialog>
    <div class="modal-wrapper">
        <form method="dialog" id="close-form"></form>

        <form id="form-validation" method="get">
            <header>
                <div class="title-area">
                    <slot name="title">Nouvelle fenêtre</slot>
                </div>
                <button class="close-icon" form="close-form" type="submit" aria-label="Fermer">&times;</button>
            </header>

            <section class="body">
                <slot></slot>
            </section>

            <footer class="actions">
                <slot name="footer">
                    <p9r-button form="close-form" type="submit" variant="ghost">Annuler</p9r-button>
                    <p9r-button form="form-validation" type="submit" variant="filled" color="primary">Confirmer</p9r-button>
                </slot>
            </footer>
        </form>
    </div>
</dialog>
