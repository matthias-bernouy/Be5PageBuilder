<w13c-lateral-dialog>
  <form action="">
    <w13c-input name="title">
      <span slot="label">Title (max 50 characters)</span>
    </w13c-input>
    <w13c-input name="description">
      <span slot="label">Description (max 120 characters)</span>
    </w13c-input>
    <w13c-input name="identifier">
      <span slot="label">Identifier (a-zA-Z0-9-)</span>
    </w13c-input>
    <w13c-input name="path">
      <span slot="label">Path (a-zA-Z0-9-)</span>
    </w13c-input>
    <w13c-checkbox name="visible">
      Rendre visible
    </w13c-checkbox>
    <div></div>
    <w13c-editor-button>
      Sauvegarder
    </w13c-editor-button>
  </form>
  <span slot="title">Page configuration</span>

</w13c-lateral-dialog>
