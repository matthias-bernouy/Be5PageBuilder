<w13c-fixed-admin-layout>
    <span slot="title">Profile</span>

    <p9r-card>
        <p9r-horizontal-action-group label="Session" description="You are currently logged in as an administrator.">
            <p9r-button id="logout-btn" color="danger">Log out</p9r-button>
        </p9r-horizontal-action-group>

        <p9r-horizontal-action-group label="API tokens" description="Manage your personal access tokens for the CMS API.">
            <p9r-button id="manage-tokens-btn" disabled>Manage tokens</p9r-button>
        </p9r-horizontal-action-group>
    </p9r-card>
</w13c-fixed-admin-layout>
