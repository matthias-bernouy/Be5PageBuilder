<w13c-fixed-admin-layout>
    <span slot="title">Templates</span>
    <p9r-open-modal modal-target="create-template-modal" slot="action">
        <p9r-button color="primary">+ New template</p9r-button>
    </p9r-open-modal>

    <p9r-table>
        <p9r-row slot="header">
            <p9r-cell><strong>Name</strong></p9r-cell>
            <p9r-cell><strong>Category</strong></p9r-cell>
            <p9r-cell><strong>Created</strong></p9r-cell>
            <p9r-cell></p9r-cell>
        </p9r-row>

        <cms-fetch url="{{BASE_PATH}}/api/template/list" reload-on="new:template">
            <template for=".">
                <p9r-row href="{{BASE_PATH}}/editor/template?id={{id}}">
                    <p9r-cell>{{ name }}</p9r-cell>
                    <p9r-cell>{{ category }}</p9r-cell>
                    <p9r-cell>{{ createdAt }}</p9r-cell>
                    <p9r-cell></p9r-cell>
                </p9r-row>
            </template>
            <template slot="empty">
                <cms-empty-state>
                    <svg slot="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M3 9h18"/>
                        <path d="M9 21V9"/>
                    </svg>
                    <p slot="title">No templates yet</p>
                    <p slot="hint">Create your first template to reuse layouts across pages.</p>
                </cms-empty-state>
            </template>
        </cms-fetch>
    </p9r-table>
</w13c-fixed-admin-layout>

<p9r-modal id="create-template-modal" aria-label="Create a new template">
    <span slot="title">Template creation</span>
    <cms-form target="{{BASE_PATH}}/api/template" emit="new:template">
        <p9r-stack gap="m">
            <p9r-input name="name" label="Name" placeholder="My hero section"></p9r-input>
            <p9r-tag-suggest name="category" mode="single" resource="templates" api="{{BASE_PATH}}/api/tags" placeholder="hero, layout, cta…">
                <span slot="label">Category</span>
            </p9r-tag-suggest>
            <p9r-button color="primary" fullWidth type="submit">Create new template</p9r-button>
        </p9r-stack>
    </cms-form>
</p9r-modal>
