<cms-fetch url="{{BASE_PATH}}/api/template">

    <template>

        <cms-editor-system>

            <link slot="style" rel="stylesheet" href="{{BASE_PATH}}/api/editor/style.css">
            <script slot="script" src="{{BASE_PATH}}/api/editor/script.js"></script>

            <cms-editor-configuration url="{{BASE_PATH}}/api/template" slot="configuration">

                <span slot="title">Template</span>

                <p9r-section data-title="Information">
                    <p9r-input value="{{name}}" name="name" label="Name" placeholder="My hero section"
                        hint="Displayed in the Templates library." max-count="50"></p9r-input>

                    <p9r-input value="{{description}}" name="description" label="Description" placeholder="A short description"
                        hint="Shown under the name in the library." max-count="120"></p9r-input>
                </p9r-section>

                <p9r-section data-title="Taxonomy">
                    <p9r-tag-suggest value="{{category}}" name="category" mode="single" resource="templates" api="../api/tags"
                        placeholder="hero, layout, cta…">
                        <span slot="label">Category</span>
                    </p9r-tag-suggest>
                </p9r-section>
            </cms-editor-configuration>

            <inner-html>{{content}}</inner-html>

        </cms-editor-system>

    </template>

</cms-fetch>
