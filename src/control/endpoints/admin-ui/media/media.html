<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media - Be5 Page Builder</title>
    <link rel="stylesheet" href="../resources/css/style.css">
    <script src="./script.js"></script>
    <script src="./media.js" defer></script>
</head>

<body>

    <w13c-fixed-admin-layout>
        <span slot="title">Media</span>

        <p9r-button slot="action" id="btn-new-folder" variant="outlined">
            <svg slot="icon-left" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 10.5v6m3-3H9m4.06-7.19-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z"/>
            </svg>
            New folder
        </p9r-button>
        <p9r-button slot="action" id="btn-upload" color="primary">
            <svg slot="icon-left" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            Upload
        </p9r-button>

        <p9r-grid-media id="media-grid" api-base="../api"></p9r-grid-media>
    </w13c-fixed-admin-layout>

</body>

</html>
