<w13c-lateral-dialog>
  <span slot="title">Page configuration</span>
  <w13c-input>
    <span slot="label">Title (max 50 characters)</span>
  </w13c-input>
  <w13c-input>
    <span slot="label">Description (max 120 characters)</span>
  </w13c-input>
  <w13c-input>
    <span slot="label">Identifier (a-zA-Z0-9-)</span>
  </w13c-input>
  <w13c-input>
    <span slot="label">BasePath (a-zA-Z0-9-)</span>
  </w13c-input>
  <w13c-checkbox>
    Rendre visible
  </w13c-checkbox>
  <w13c-button onclick="document.EditorManager.save()">
    Sauvegarder
  </w13c-button>
</w13c-lateral-dialog>
